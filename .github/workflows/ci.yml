name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: TypeScript build, type-check, ESLint, Jest
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run Jest tests
        run: npm test -- --coverage

      - name: Build frontend
        run: npm run build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Backend: Go build, test, golangci-lint
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Verify go.sum
        run: go mod verify

      - name: Build (host OS)
        run: go build ./...

      - name: Cross-compile for Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o gpx_govee_datasource_linux_amd64 ./pkg/main.go

      - name: Run Go tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.go-version }}
          path: coverage.out
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Lint: golangci-lint (separate job so failures are clearly attributed)
  # ---------------------------------------------------------------------------
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ---------------------------------------------------------------------------
  # Security: check for hardcoded secrets (belt-and-suspenders)
  # ---------------------------------------------------------------------------
  security:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
