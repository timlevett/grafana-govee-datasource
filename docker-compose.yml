version: '3.8'

services:
  grafana:
    image: grafana/grafana:13.0.0-24165874688
    ports:
      - '3000:3000'
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: timlevett-govee-datasource
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./dist:/var/lib/grafana/plugins/timlevett-govee-datasource
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
